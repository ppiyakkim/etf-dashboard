name: Update ETF data

on:
  schedule:
    # 09:10 ET ≈ 13:10 / 14:10 UTC (cron is UTC). Two entries cover DST.
    - cron: "10 13 * * 1-5"
    - cron: "10 21 * * 1-5"   # also a post-close refresh
  workflow_dispatch:        # manual "Run workflow" button

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install yfinance

      - name: Build data
        run: python scripts/fetch_data.py

      - name: Commit if changed
        run: |
          git config user.name  "etf-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/etf_data.json
          if git diff --staged --quiet; then
            echo "no change"
          else
            git commit -m "data: refresh $(date -u +%F)"
            git push
          fi
