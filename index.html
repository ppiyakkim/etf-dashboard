<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THEME ETF MONITOR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Archivo:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#070a0f;--panel:#0c1117;--panel-edge:#1a2330;
    --navy-top:#0f2342;--navy-bot:#0a1525;--grid:rgba(120,160,220,.10);
    --ink:#eef2f7;--ink-dim:#7c8aa0;--ink-faint:#4a586b;
    --orange:#f5a200;--orange-ink:#0a0a0a;--green:#22d36a;--red:#ff4d4d;
    --spark:#f4f7fb;--bar-track:rgba(255,255,255,.06);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--ink);font-family:'IBM Plex Mono',monospace;-webkit-font-smoothing:antialiased}
  body{background-image:radial-gradient(circle at 18% -10%,rgba(245,162,0,.05),transparent 40%),radial-gradient(circle at 90% 110%,rgba(34,90,180,.07),transparent 45%);min-height:100vh;padding:0 0 64px}

  /* masthead */
  .masthead{border-bottom:1px solid var(--panel-edge);padding:20px clamp(16px,3vw,44px) 16px;display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:14px}
  .brand{display:flex;align-items:center;gap:14px}
  .brand .mark{background:var(--orange);color:var(--orange-ink);font-family:'Archivo',sans-serif;font-weight:900;font-size:13px;letter-spacing:.5px;padding:7px 11px;border-radius:3px;line-height:1}
  .brand h1{font-family:'Archivo',sans-serif;font-weight:800;font-size:clamp(18px,3.2vw,28px);letter-spacing:1px;line-height:.95}
  .brand h1 span{color:var(--orange)}
  .brand p{color:var(--ink-faint);font-size:10px;letter-spacing:2px;margin-top:4px}
  .meta{text-align:right;font-size:11px;color:var(--ink-dim);letter-spacing:.5px;line-height:1.8}
  .meta b{color:var(--ink)}
  .badge-sample{display:inline-block;background:#3a2a00;color:var(--orange);border:1px solid var(--orange);border-radius:3px;padding:2px 7px;font-size:10px;letter-spacing:1.5px}
  .badge-live{display:inline-block;background:#06281a;color:var(--green);border:1px solid var(--green);border-radius:3px;padding:2px 7px;font-size:10px;letter-spacing:1.5px}

  /* summary */
  #summary{padding:16px clamp(12px,2.4vw,40px);border-bottom:1px solid var(--panel-edge);background:rgba(0,0,0,.25)}
  .sum-label{font-size:9px;letter-spacing:2.5px;color:var(--ink-faint);margin-bottom:10px}
  .sum-cards{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
  .sum-card{background:var(--panel);border:1px solid var(--panel-edge);border-radius:4px;padding:9px 13px;min-width:130px;flex:1}
  .sum-card .sc-lbl{font-size:8.5px;letter-spacing:1.5px;color:var(--ink-faint);margin-bottom:4px}
  .sum-card .sc-val{font-family:'Archivo',sans-serif;font-weight:800;font-size:18px;line-height:1}
  .sum-card .sc-sub{font-size:9px;color:var(--ink-dim);margin-top:3px;letter-spacing:.5px}
  .sc-val.up{color:var(--green)}.sc-val.down{color:var(--red)}.sc-val.neutral{color:var(--ink)}
  .pulse-counts{display:flex;gap:6px;align-items:baseline}
  .pulse-counts .u{color:var(--green);font-family:'Archivo',sans-serif;font-weight:800;font-size:22px}
  .pulse-counts .d{color:var(--red);font-family:'Archivo',sans-serif;font-weight:800;font-size:22px}
  .pulse-counts .sep{color:var(--ink-faint);font-size:13px}

  .sum-groups{display:flex;flex-direction:column;gap:6px}
  .sg-row{display:flex;align-items:center;gap:10px}
  .sg-name{font-size:9px;letter-spacing:1.5px;color:var(--ink-dim);width:130px;flex-shrink:0;text-align:right}
  .sg-track{flex:1;height:7px;background:var(--bar-track);border-radius:2px;overflow:hidden}
  .sg-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,#7a1a1a,#ff4d4d)}
  .sg-val{font-size:10px;font-weight:700;color:var(--red);min-width:48px}
  .sg-val.shallow{color:#ff9a5c}

  /* group sections */
  main{padding:0 clamp(12px,2.4vw,40px)}
  .group{margin-top:28px}
  .group-head{display:flex;align-items:center;gap:14px;margin:0 2px 12px}
  .group-head .tag{background:#11161d;border:1px solid var(--panel-edge);border-left:3px solid var(--orange);font-family:'Archivo',sans-serif;font-weight:800;font-size:13px;letter-spacing:1px;padding:6px 13px;border-radius:0 3px 3px 0;white-space:nowrap}
  .group-head .en{color:var(--ink-faint);font-size:9px;letter-spacing:3px}
  .group-head .rule{flex:1;height:1px;background:var(--panel-edge)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(285px,1fr));gap:11px}

  /* tile */
  .tile{background:var(--panel);border:1px solid var(--panel-edge);border-radius:5px;padding:11px;display:flex;flex-direction:column;gap:8px;transition:border-color .15s,transform .15s}
  .tile:hover{border-color:#2c3a4f;transform:translateY(-2px)}
  .tile-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
  .label-box{background:var(--orange);color:var(--orange-ink);font-weight:700;font-size:13px;letter-spacing:.3px;padding:5px 9px;border-radius:3px;line-height:1.05}
  .label-box .tk{display:block;font-size:9.5px;font-weight:600;opacity:.75;letter-spacing:1px;margin-top:1px}
  .tile-sub{text-align:right;color:var(--ink-faint);font-size:8px;letter-spacing:1px;line-height:1.6;padding-top:2px}

  /* chart + xaxis */
  .chart-wrap{position:relative;border-radius:3px;overflow:hidden;border:1px solid #11305a;background:linear-gradient(180deg,var(--navy-top),var(--navy-bot));user-select:none}
  .chart-wrap svg{display:block;width:100%;height:90px}
  .xaxis{display:flex;position:relative;height:15px;padding:0 6px}
  .xaxis-tick{position:absolute;font-size:7.5px;color:var(--ink-faint);letter-spacing:.3px;transform:translateX(-50%);white-space:nowrap;line-height:15px}

  /* price / dd rows */
  .price-row{display:flex;align-items:flex-end;justify-content:space-between;gap:8px}
  .close-box{background:#f4f7fb;color:#0a0a0a;font-weight:700;font-size:11px;padding:3px 7px;border-radius:2px;letter-spacing:.2px}
  .close-box span{color:#5a6472;font-weight:600;margin-right:3px}
  .chg{font-family:'Archivo',sans-serif;font-weight:800;font-size:20px;letter-spacing:.5px;line-height:1}
  .up{color:var(--green)}.down{color:var(--red)}
  .dd{display:flex;align-items:center;gap:9px;padding-top:1px}
  .dd-label{color:var(--ink-faint);font-size:8.5px;letter-spacing:1px;white-space:nowrap}
  .dd-track{flex:1;height:7px;background:var(--bar-track);border-radius:2px;overflow:hidden}
  .dd-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,#7a1a1a,#ff4d4d)}
  .dd-val{font-weight:700;font-size:11.5px;color:var(--red);white-space:nowrap;min-width:52px;text-align:right}
  .dd-val.shallow{color:#ff9a5c}

  /* tile click + holdings panel */
  .tile{cursor:pointer}
  .tile.selected{border-color:var(--orange)!important;box-shadow:0 0 0 1px var(--orange)}
  .tile-hint{font-size:7.5px;letter-spacing:1.5px;color:var(--ink-faint);text-align:center;padding:2px 0 0;opacity:0;transition:opacity .2s}
  .tile:hover .tile-hint{opacity:.7}
  .tile.selected .tile-hint{color:var(--orange);opacity:.9}

  .holdings-panel{margin-top:12px;background:var(--panel);border:1px solid var(--panel-edge);border-radius:5px;overflow:hidden}
  .hp-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:rgba(0,0,0,.3);border-bottom:1px solid var(--panel-edge)}
  .hp-title{font-family:'Archivo',sans-serif;font-weight:800;font-size:12px;letter-spacing:1px;color:var(--orange)}
  .hp-sub{font-size:9px;color:var(--ink-faint);letter-spacing:1px;margin-left:10px}
  .hp-close{background:none;border:1px solid var(--panel-edge);color:var(--ink-dim);cursor:pointer;font-size:9px;padding:3px 9px;border-radius:3px;font-family:inherit;letter-spacing:.5px}
  .hp-close:hover{border-color:var(--orange);color:var(--orange)}
  .hp-treemap{padding:12px}
  .hp-note{font-size:8px;color:var(--ink-faint);padding:0 14px 10px;letter-spacing:.5px}

  /* price change with date ref */
  .chg-wrap{display:flex;flex-direction:column;align-items:flex-end;gap:1px}
  .chg-vs{font-size:8px;color:var(--ink-faint);letter-spacing:.3px;white-space:nowrap}

  /* tooltip */
  #tooltip{position:fixed;pointer-events:none;z-index:200;display:none;
    background:#111d2d;border:1px solid #2c3d55;border-radius:4px;
    padding:8px 11px;font-size:10.5px;line-height:1.7;white-space:nowrap;
    box-shadow:0 4px 20px rgba(0,0,0,.6)}
  #tooltip[data-mode="label"]{white-space:normal;max-width:230px;min-width:160px}
  #tooltip .tt-date{color:var(--ink-faint);font-size:9.5px;letter-spacing:.5px}
  #tooltip .tt-ticker{color:var(--orange);font-weight:700;font-size:10px;letter-spacing:1px}
  #tooltip .tt-price{color:var(--ink);font-weight:700}
  #tooltip .tt-desc{color:var(--ink-dim);font-size:10px;line-height:1.5;margin-top:2px}
  #tooltip .tt-chg{font-weight:700}
  #tooltip .tt-chg.up{color:var(--green)}
  #tooltip .tt-chg.down{color:var(--red)}

  /* ticker bar */
  .tickerbar{position:fixed;left:0;right:0;bottom:0;display:flex;align-items:stretch;height:32px;background:var(--bg);border-top:1px solid var(--panel-edge);z-index:20}
  .tickerbar .stamp{background:#f4f7fb;color:#0a0a0a;font-weight:700;font-size:10px;display:flex;align-items:center;padding:0 13px;letter-spacing:1px;white-space:nowrap}
  .tickerbar .feed{flex:1;background:#06281a;overflow:hidden;position:relative}
  .feed-inner{position:absolute;white-space:nowrap;height:100%;display:flex;align-items:center;color:var(--green);font-size:10.5px;letter-spacing:.5px;animation:scroll 65s linear infinite;will-change:transform}
  .feed-inner span{padding:0 20px}
  .feed-inner .u{color:var(--green)}.feed-inner .d{color:var(--red)}.feed-inner .sep{color:#0d8a52}
  @keyframes scroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}

  .empty{padding:60px 20px;text-align:center;color:var(--ink-dim);font-size:13px}
  @media(max-width:560px){.grid{grid-template-columns:1fr}.sg-name{width:90px}.sum-card{min-width:100px}}
</style>
</head>
<body>

<header class="masthead">
  <div class="brand">
    <div class="mark">SC</div>
    <div>
      <h1>THEME ETF <span>MONITOR</span></h1>
      <p>STUDIOCHICK · MACRO DESK · DAILY DRAWDOWN BOARD</p>
    </div>
  </div>
  <div class="meta" id="meta">
    <div>SOURCE&nbsp;&nbsp;<b>YAHOO FINANCE</b></div>
    <div>AS OF&nbsp;&nbsp;<b id="asof">—</b></div>
    <div id="statusBadge"></div>
  </div>
</header>

<section id="summary" style="display:none">
  <div class="sum-label">TODAY'S PULSE</div>
  <div class="sum-cards" id="sumCards"></div>
  <div class="sum-label">AVG DRAWDOWN FROM PEAK · BY GROUP</div>
  <div class="sum-groups" id="sumGroups"></div>
</section>

<main id="board"><div class="empty">LOADING FEED…</div></main>

<div id="tooltip">
  <div class="tt-ticker" id="ttTicker" style="display:none"></div>
  <div class="tt-date" id="ttDate"></div>
  <div class="tt-price" id="ttPrice"></div>
  <div class="tt-desc" id="ttDesc" style="display:none"></div>
  <div class="tt-chg" id="ttChg"></div>
</div>

<div class="tickerbar">
  <div class="stamp" id="stamp">ETF</div>
  <div class="feed"><div class="feed-inner" id="feed"></div></div>
</div>

<script>
const NUM=(n,d=2)=>(n==null||isNaN(n))?'—':Number(n).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});
const SIGN=n=>(n>=0?'+':'')+NUM(n,2)+'%';
const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

const ETF_DESC = {
  // SECTOR
  'XLK':'Technology Select Sector SPDR — US large-cap tech (Apple, MSFT, NVIDIA)',
  'XLV':'Health Care Select Sector SPDR — pharma, biotech & medical devices',
  'XLF':'Financial Select Sector SPDR — banks, insurance & financial services',
  'XLC':'Comm Services Select Sector — Meta, Alphabet, Netflix & telecom/media',
  'XLY':'Consumer Discretionary SPDR — Amazon, Tesla, retail & leisure',
  'XLP':'Consumer Staples SPDR — food, beverage & household essentials',
  'XLI':'Industrials Select Sector SPDR — aerospace, defense & transport',
  'XLU':'Utilities Select Sector SPDR — electric, gas & water utilities',
  'XLE':'Energy Select Sector SPDR — oil & gas exploration & production',
  'XLRE':'Real Estate Select Sector SPDR — US equity REITs',
  'XLB':'Materials Select Sector SPDR — chemicals, mining & paper',
  // STYLE
  'VUG':'Vanguard Large-Cap Growth ETF — Russell 1000 growth stocks',
  'MGK':'Vanguard Mega-Cap Growth ETF — top growth mega-caps incl. Magnificent 7',
  'IWP':'iShares Russell Mid-Cap Growth ETF — mid-size growth companies',
  'VBK':'Vanguard Small-Cap Growth ETF — small company growth stocks',
  'VTV':'Vanguard Large-Cap Value ETF — large-cap value stocks',
  'VOE':'Vanguard Mid-Cap Value ETF — mid-size value companies',
  'VBR':'Vanguard Small-Cap Value ETF — small company value stocks',
  // GROWTH THEMES
  'SOXX':'iShares Semiconductor ETF — Intel, TSMC, NVIDIA & chip makers',
  'IGV':'iShares Expanded Tech-Software ETF — large software companies',
  'SKYY':'First Trust Cloud Computing ETF — cloud infrastructure & SaaS',
  'AIQ':'Global X AI & Technology ETF — AI solutions & big data companies',
  'CIBR':'First Trust Cybersecurity ETF — information security & cyber defense',
  'FINX':'Global X Fintech ETF — digital payments & financial technology',
  // DIVIDEND
  'VIG':'Vanguard Dividend Appreciation ETF — 10+ yrs of consecutive dividend growth',
  'SCHD':'Schwab US Dividend Equity ETF — quality high-dividend stocks (Dow Jones)',
  'NOBL':'ProShares S&P 500 Dividend Aristocrats — 25+ yrs consecutive dividend growth',
  'DVY':'iShares Select Dividend ETF — high-yield dividend stocks',
  'VNQ':'Vanguard Real Estate ETF — broad US REIT exposure',
  'JEPQ':'JPMorgan NASDAQ Equity Premium Income ETF — covered calls, monthly dividend',
  // INNOVATION
  'ARKK':'ARK Innovation ETF — disruptive innovation companies (ARK Invest active)',
  'BOTZ':'Global X Robotics & AI ETF — robotics & automation companies',
  'URA':'Global X Uranium ETF — uranium mining & nuclear energy',
  'LIT':'Global X Lithium & Battery Tech ETF — battery makers & lithium miners',
  'ICLN':'iShares Global Clean Energy ETF — wind, solar & clean energy',
  'IBIT':'iShares Bitcoin Trust ETF — spot Bitcoin ETF by BlackRock',
};

// derive approximate trading dates backwards from a reference date
function deriveDates(asOfStr, n) {
  let ref = new Date((asOfStr||'').replace(/ \(SAMPLE\)/,''));
  if (isNaN(ref)) ref = new Date();
  const dates=[], cur=new Date(ref);
  while(dates.length<n){
    if(cur.getDay()!==0&&cur.getDay()!==6) dates.unshift(cur.toISOString().slice(0,10));
    cur.setDate(cur.getDate()-1);
  }
  return dates;
}

function buildXAxis(dates) {
  const n=dates.length;
  const ticks=[];
  let lastMon=-1;
  for(let i=0;i<n;i++){
    const mon=new Date(dates[i]).getMonth();
    if(mon!==lastMon){ticks.push({i,label:MONTHS[mon]});lastMon=mon;}
  }
  const W=100; // percentage
  return ticks.map(t=>{
    const pct=(t.i/(n-1))*W;
    return `<span class="xaxis-tick" style="left:${pct.toFixed(1)}%">${t.label}</span>`;
  }).join('');
}

function sparkSVG(pts) {
  const W=300,H=90,pad=5;
  if(!pts||pts.length<2) return `<svg viewBox="0 0 ${W} ${H}"></svg>`;
  const min=Math.min(...pts),max=Math.max(...pts),rng=(max-min)||1;
  const dx=(W-pad*2)/(pts.length-1);
  const xy=pts.map((p,i)=>[pad+i*dx, pad+(H-pad*2)*(1-(p-min)/rng)]);
  const path=xy.map((c,i)=>(i?'L':'M')+c[0].toFixed(1)+' '+c[1].toFixed(1)).join(' ');
  const last=xy[xy.length-1];
  let grid='';
  for(let i=1;i<4;i++){const y=(H/4)*i;grid+=`<line x1="0" y1="${y.toFixed(0)}" x2="${W}" y2="${y.toFixed(0)}" stroke="var(--grid)" stroke-width="1"/>`;}
  for(let i=1;i<6;i++){const x=(W/6)*i;grid+=`<line x1="${x.toFixed(0)}" y1="0" x2="${x.toFixed(0)}" y2="${H}" stroke="var(--grid)" stroke-width="1"/>`;}
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    ${grid}
    <path d="${path}" fill="none" stroke="var(--spark)" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="${last[0].toFixed(1)}" cy="${last[1].toFixed(1)}" r="2.5" fill="var(--spark)"/>
  </svg>`;
}

function tile(e, asOf, gIdx) {
  const up=(e.change_pct||0)>=0;
  const dd=e.drawdown_pct==null?null:Math.abs(e.drawdown_pct);
  const ddW=dd==null?0:Math.min(100,dd);
  const shallow=dd!=null&&dd<8;
  const dates=e.spark_dates||deriveDates(asOf,e.spark?e.spark.length:40);
  const sparksJson=JSON.stringify(e.spark||[]);
  const datesJson=JSON.stringify(dates);
  const closeVal=e.close||0;
  const pd=e.prev_date||'';
  const pdObj=pd?new Date(pd+'T00:00:00'):null;
  const prevDateShort=pdObj&&!isNaN(pdObj)?MONTHS[pdObj.getMonth()]+' '+pdObj.getDate():'';
  return `<div class="tile" data-ticker="${e.ticker}" data-group="${gIdx}" onclick="openHoldings(${gIdx},'${e.ticker}')">
    <div class="tile-top">
      <div class="label-box" data-ticker="${e.ticker}"
           onmouseenter="lbShow(event,this)"
           onmousemove="lbMove(event)"
           onmouseleave="ttHide()">${e.label||e.ticker}<span class="tk">${e.ticker}</span></div>
      <div class="tile-sub">THEME ETF MONITOR<br>PER. DAILY · CLOSE</div>
    </div>
    <div class="chart-wrap"
         data-spark='${sparksJson}'
         data-dates='${datesJson}'
         data-close="${closeVal}"
         onmouseenter="ttShow(event,this)"
         onmousemove="ttMove(event,this)"
         onmouseleave="ttHide()">
      ${sparkSVG(e.spark)}
      <div class="xaxis">${buildXAxis(dates)}</div>
    </div>
    <div class="price-row">
      <div class="close-box"><span>CLOSE</span>$${NUM(e.close,2)}</div>
      <div class="chg-wrap">
        <div class="chg ${up?'up':'down'}">${SIGN(e.change_pct)}</div>
        ${prevDateShort?`<div class="chg-vs">vs ${prevDateShort}</div>`:''}
      </div>
    </div>
    <div class="dd">
      <div class="dd-label">FROM PEAK</div>
      <div class="dd-track"><div class="dd-fill" style="width:${ddW}%"></div></div>
      <div class="dd-val ${shallow?'shallow':''}">${dd==null?'—':'-'+NUM(dd,1)+'%'}</div>
    </div>
    <div class="tile-hint">▼ TOP HOLDINGS</div>
  </div>`;
}

// tooltip logic
const ttEl=document.getElementById('tooltip');
const ttTicker=document.getElementById('ttTicker');
const ttDate=document.getElementById('ttDate');
const ttPrice=document.getElementById('ttPrice');
const ttDesc=document.getElementById('ttDesc');
const ttChg=document.getElementById('ttChg');

function ttShow(e,el){
  ttEl.dataset.mode='chart';
  ttTicker.style.display='none';
  ttDesc.style.display='none';
  ttEl.style.display='block';
  ttMove(e,el);
}
function ttHide(){ttEl.style.display='none';}
function ttMove(e,el){
  const rect=el.getBoundingClientRect();
  const pct=Math.max(0,Math.min(1,(e.clientX-rect.left)/rect.width));
  const spark=JSON.parse(el.dataset.spark||'[]');
  const dates=JSON.parse(el.dataset.dates||'[]');
  const close=parseFloat(el.dataset.close)||0;
  if(!spark.length) return;
  const idx=Math.round(pct*(spark.length-1));
  const price=spark[idx];
  const date=dates[idx]||'';
  // today vs that date: positive means today is higher than that date
  const pctVsDate=close>0&&price>0?((close/price-1)*100):0;
  const up=close>=price;
  const d=new Date(date+'T00:00:00');
  const dateStr=isNaN(d)?date:[MONTHS[d.getMonth()],d.getDate()+',',d.getFullYear()].join(' ');
  ttDate.textContent=dateStr;
  ttPrice.textContent='$'+NUM(price,2);
  ttChg.textContent='TODAY '+(pctVsDate>=0?'+':'')+NUM(pctVsDate,1)+'% vs '+dateStr;
  ttChg.className='tt-chg '+(up?'up':'down');
  ttEl.style.removeProperty('max-width');
  const tipW=Math.max(180, ttEl.offsetWidth);
  let x=e.clientX+14, y=e.clientY-54;
  if(x+tipW>window.innerWidth) x=e.clientX-tipW-4;
  if(y<4) y=4;
  ttEl.style.left=x+'px';ttEl.style.top=y+'px';
}

function lbShow(e,el){
  const ticker=el.dataset.ticker||'';
  const desc=ETF_DESC[ticker]||'';
  ttEl.dataset.mode='label';
  ttTicker.textContent=ticker;
  ttTicker.style.display='block';
  ttDate.textContent='';
  ttPrice.textContent='';
  ttDesc.textContent=desc;
  ttDesc.style.display=desc?'block':'none';
  ttChg.textContent='';
  ttChg.className='tt-chg';
  ttEl.style.display='block';
  lbMove(e);
}
function lbMove(e){
  const tipW=230;
  let x=e.clientX+14, y=e.clientY-20;
  if(x+tipW>window.innerWidth) x=e.clientX-tipW-4;
  if(y<4) y=4;
  ttEl.style.left=x+'px';ttEl.style.top=y+'px';
}

// ── Holdings treemap ──────────────────────────────────────
const ETF_STORE = {};

function tmLayout(nodes, x, y, w, h) {
  if (!nodes.length) return [];
  if (nodes.length === 1) return [{...nodes[0], x, y, w, h}];
  const total = nodes.reduce((s,n)=>s+n.v,0);
  let sum=0, split=1;
  for(let i=0;i<nodes.length-1;i++){sum+=nodes[i].v;split=i+1;if(sum>=total/2)break;}
  const frac = nodes.slice(0,split).reduce((s,n)=>s+n.v,0)/total;
  if(w>=h){
    const mx=x+w*frac;
    return [...tmLayout(nodes.slice(0,split),x,y,mx-x,h),...tmLayout(nodes.slice(split),mx,y,x+w-mx,h)];
  }else{
    const my=y+h*frac;
    return [...tmLayout(nodes.slice(0,split),x,y,w,my-y),...tmLayout(nodes.slice(split),x,my,w,y+h-my)];
  }
}

function tmColor(i, total) {
  const t=1-i/Math.max(total-1,1);
  return `rgb(${Math.round(12+t*28)},${Math.round(45+t*75)},${Math.round(95+t*95)})`;
}

function renderTreemap(holdings, container) {
  if(!holdings||!holdings.length){
    container.innerHTML='<div style="padding:40px 20px;text-align:center;color:var(--ink-faint);font-size:11px;letter-spacing:1px">NO HOLDINGS DATA · RE-RUN DATA FETCH</div>';
    return;
  }
  const W=container.clientWidth||600, H=260, G=2;
  const nodes=[...holdings].filter(h=>h.weight>0).sort((a,b)=>b.weight-a.weight).map(h=>({ticker:h.ticker,name:h.name,v:h.weight}));
  const layout=tmLayout(nodes,0,0,W,H);
  const cells=layout.map((cell,i)=>{
    const {x,y,w,h,ticker,name,v}=cell;
    const bg=tmColor(i,nodes.length);
    const showTk=w>44&&h>26, showPct=w>44&&h>46;
    const fs=Math.min(14,Math.max(9,w/Math.max((ticker||'').length,1)*1.5));
    const safeT=(ticker||'').replace(/&/g,'&amp;').replace(/'/g,'&#39;');
    const safeN=(name||ticker||'').replace(/&/g,'&amp;').replace(/'/g,'&#39;').replace(/"/g,'&quot;');
    return `<g onmouseenter="tmTip(event,'${safeT}','${safeN}',${v})" onmouseleave="ttHide()">
      <rect x="${(x+G).toFixed(1)}" y="${(y+G).toFixed(1)}" width="${Math.max(0,w-G*2).toFixed(1)}" height="${Math.max(0,h-G*2).toFixed(1)}" rx="3" fill="${bg}"/>
      ${showTk?`<text x="${(x+w/2).toFixed(1)}" y="${(y+h/2+(showPct?-7:4)).toFixed(1)}" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="${fs.toFixed(0)}" font-weight="700" font-family="Archivo,sans-serif" pointer-events="none">${safeT}</text>`:''}
      ${showPct?`<text x="${(x+w/2).toFixed(1)}" y="${(y+h/2+9).toFixed(1)}" text-anchor="middle" dominant-baseline="middle" fill="rgba(255,255,255,0.7)" font-size="9.5" font-family="IBM Plex Mono,monospace" pointer-events="none">${v.toFixed(1)}%</text>`:''}
    </g>`;
  }).join('');
  container.innerHTML=`<svg width="${W}" height="${H}" style="display:block">${cells}</svg>`;
}

function tmTip(e, ticker, name, weight) {
  ttEl.dataset.mode='label';
  ttTicker.textContent=ticker;
  ttTicker.style.display='block';
  ttDate.textContent='';
  ttPrice.textContent=name;
  ttDesc.textContent=NUM(weight,2)+'% of portfolio';
  ttDesc.style.display='block';
  ttChg.textContent='';ttChg.className='tt-chg';
  ttEl.style.display='block';
  let x=e.clientX+14,y=e.clientY-20;
  if(x+240>window.innerWidth)x=e.clientX-240-4;
  if(y<4)y=4;
  ttEl.style.left=x+'px';ttEl.style.top=y+'px';
}

let _activeHP=null;

function openHoldings(gIdx, ticker) {
  ttHide();
  const etf=ETF_STORE[ticker];
  const panel=document.getElementById('hp-'+gIdx);
  if(!panel||!etf) return;
  if(_activeHP&&_activeHP.gIdx===gIdx&&_activeHP.ticker===ticker){
    panel.style.display='none';
    document.querySelectorAll('.tile.selected').forEach(t=>t.classList.remove('selected'));
    _activeHP=null;return;
  }
  if(_activeHP){
    const prev=document.getElementById('hp-'+_activeHP.gIdx);
    if(prev)prev.style.display='none';
    document.querySelectorAll('.tile.selected').forEach(t=>t.classList.remove('selected'));
  }
  _activeHP={gIdx,ticker};
  document.querySelectorAll(`.tile[data-ticker="${ticker}"]`).forEach(t=>t.classList.add('selected'));
  const hdr=document.getElementById('hpt-'+gIdx);
  if(hdr)hdr.textContent=`${ticker} · ${etf.label||ticker}`;
  panel.style.display='block';
  const mapEl=document.getElementById('hpmap-'+gIdx);
  if(mapEl)requestAnimationFrame(()=>{
    renderTreemap(etf.holdings||[],mapEl);
    panel.scrollIntoView({behavior:'smooth',block:'nearest'});
  });
}

function closeHoldings(gIdx) {
  const panel=document.getElementById('hp-'+gIdx);
  if(panel)panel.style.display='none';
  document.querySelectorAll('.tile.selected').forEach(t=>t.classList.remove('selected'));
  _activeHP=null;
}
// ──────────────────────────────────────────────────────────

function buildSummary(data){
  const all=data.groups.flatMap(g=>g.etfs.map(e=>({...e,gname:g.name_en})));
  const valid=all.filter(e=>e.change_pct!=null);
  const upCount=valid.filter(e=>e.change_pct>=0).length;
  const dnCount=valid.filter(e=>e.change_pct<0).length;
  const best=valid.reduce((a,b)=>a.change_pct>b.change_pct?a:b,valid[0]);
  const worst=valid.reduce((a,b)=>a.change_pct<b.change_pct?a:b,valid[0]);
  const ddV=all.filter(e=>e.drawdown_pct!=null);
  const shallowest=ddV.reduce((a,b)=>a.drawdown_pct>b.drawdown_pct?a:b,ddV[0]);
  const deepest=ddV.reduce((a,b)=>a.drawdown_pct<b.drawdown_pct?a:b,ddV[0]);

  document.getElementById('sumCards').innerHTML=`
    <div class="sum-card">
      <div class="sc-lbl">UP / DOWN TODAY</div>
      <div class="pulse-counts">
        <span class="u">▲${upCount}</span><span class="sep">/</span><span class="d">▼${dnCount}</span>
      </div>
      <div class="sc-sub">${valid.length} ETFs tracked</div>
    </div>
    <div class="sum-card">
      <div class="sc-lbl">BEST DAILY</div>
      <div class="sc-val up">${SIGN(best?.change_pct)}</div>
      <div class="sc-sub">${best?.ticker} · ${best?.label}</div>
    </div>
    <div class="sum-card">
      <div class="sc-lbl">WORST DAILY</div>
      <div class="sc-val down">${SIGN(worst?.change_pct)}</div>
      <div class="sc-sub">${worst?.ticker} · ${worst?.label}</div>
    </div>
    <div class="sum-card">
      <div class="sc-lbl">MOST RESILIENT</div>
      <div class="sc-val" style="color:#ff9a5c;font-family:'Archivo',sans-serif;font-weight:800;font-size:18px">-${NUM(Math.abs(shallowest?.drawdown_pct),1)}%</div>
      <div class="sc-sub">${shallowest?.ticker} · ${shallowest?.label}</div>
    </div>
    <div class="sum-card">
      <div class="sc-lbl">DEEPEST DRAWDOWN</div>
      <div class="sc-val down">-${NUM(Math.abs(deepest?.drawdown_pct),1)}%</div>
      <div class="sc-sub">${deepest?.ticker} · ${deepest?.label}</div>
    </div>`;

  const maxAbs=Math.max(...data.groups.map(g=>{
    const dds=g.etfs.filter(e=>e.drawdown_pct!=null).map(e=>Math.abs(e.drawdown_pct));
    return dds.length?dds.reduce((a,b)=>a+b,0)/dds.length:0;
  }));
  document.getElementById('sumGroups').innerHTML=data.groups.map(g=>{
    const dds=g.etfs.filter(e=>e.drawdown_pct!=null).map(e=>Math.abs(e.drawdown_pct));
    const avg=dds.length?dds.reduce((a,b)=>a+b,0)/dds.length:0;
    const w=(avg/Math.max(maxAbs,1)*100).toFixed(1);
    const shallow=avg<8;
    return `<div class="sg-row">
      <div class="sg-name">${g.name_en}</div>
      <div class="sg-track"><div class="sg-fill" style="width:${w}%"></div></div>
      <div class="sg-val ${shallow?'shallow':''}">-${NUM(avg,1)}%</div>
    </div>`;
  }).join('');

  document.getElementById('summary').style.display='block';
}

function render(data){
  document.getElementById('asof').textContent=data.as_of||'—';
  const badge=document.getElementById('statusBadge');
  badge.innerHTML=data.sample?'<span class="badge-sample">SAMPLE DATA</span>':'<span class="badge-live">LIVE</span>';

  buildSummary(data);

  // populate ETF store for holdings lookup
  (data.groups||[]).forEach(g=>g.etfs.forEach(e=>{ETF_STORE[e.ticker]=e;}));

  document.getElementById('board').innerHTML=(data.groups||[]).map((g,gIdx)=>`
    <section class="group">
      <div class="group-head">
        <div class="tag">${g.name_en||g.name}</div>
        <div class="en">${g.name||''}</div>
        <div class="rule"></div>
      </div>
      <div class="grid">${g.etfs.map(e=>tile(e,data.as_of,gIdx)).join('')}</div>
      <div class="holdings-panel" id="hp-${gIdx}" style="display:none">
        <div class="hp-header">
          <div>
            <span class="hp-title" id="hpt-${gIdx}">—</span>
            <span class="hp-sub">TOP HOLDINGS · YAHOO FINANCE</span>
          </div>
          <button class="hp-close" onclick="closeHoldings(${gIdx})">✕ CLOSE</button>
        </div>
        <div class="hp-treemap" id="hpmap-${gIdx}"></div>
        <div class="hp-note">Source: Yahoo Finance funds data. Weights reflect latest available filing.</div>
      </div>
    </section>`).join('');

  const all=(data.groups||[]).flatMap(g=>g.etfs);
  const seg=all.map(e=>{const up=(e.change_pct||0)>=0;return `<span><b>${e.ticker}</b> $${NUM(e.close,2)} <span class="${up?'u':'d'}">${SIGN(e.change_pct)}</span></span><span class="sep">|</span>`;}).join('');
  document.getElementById('feed').innerHTML=seg+seg;
  const ny=new Date().toLocaleTimeString('en-US',{timeZone:'America/New_York',hour12:false});
  document.getElementById('stamp').textContent=data.sample?'SAMPLE':'NY '+ny;
}

async function boot(){
  try{
    const r=await fetch('./data/etf_data.json',{cache:'no-store'});
    if(!r.ok) throw new Error('no json');
    render(await r.json());
  }catch(e){render(window.__FALLBACK__);}
}

window.__FALLBACK__={as_of:'DEMO',sample:true,groups:[{name:'SECTOR',name_en:'SECTOR',etfs:[
  {ticker:'XLK',label:'Info Tech',close:0,change_pct:0,drawdown_pct:-0.7},
  {ticker:'XLF',label:'Financials',close:0,change_pct:0,drawdown_pct:-8.1}
]}]};
boot();
</script>
